query RepoDetail(
  $owner: String!,
  $repo: String!
) {
  repository(
    owner: $owner,
    name: $repo
  ) {
    id
    name
    description

    stargazerCount
    forkCount

    owner {
      login
    }

    primaryLanguage {
      name
    }

    repositoryTopics(first: 20) {
      nodes {
        topic {
          name
        }
      }
    }

    releases(first: 20) {
      nodes {
        name
        tagName
        publishedAt
      }
    }
  }
}